image_size: 224
resize_size: 256

normalize:
  mean: [0.485, 0.456, 0.406]
  std:  [0.229, 0.224, 0.225]

train_transforms:
  - name: random_resized_crop
    params:
      size: 224
      scale: [0.7, 1.0]
      ratio: [0.75, 1.3333]

  - name: random_horizontal_flip
    params:
      p: 0.5

  - name: random_rotation
    params:
      degrees: 15

  - name: color_jitter
    params:
      brightness: 0.2
      contrast: 0.2
      saturation: 0.2
      hue: 0.05

  - name: to_tensor
    params: {}

  - name: normalize
    params: {}

eval_transforms:
  - name: resize
    params:
      size: 256

  - name: center_crop
    params:
      size: 224

  - name: to_tensor
    params: {}

  - name: normalize
    params: {}